            { name: "Hoopla Digital Free Library", url: "https://www.hoopladigital.com/" },
            { name: "Popcornflix Legal Stream Hub", url: "https://www.popcornflix.com/" },
            { name: "Filmzie Free Movies & Indice", url: "https://filmzie.com/" }
        ],
        [
            { name: "GitHub Official Desktop App", url: "https://desktop.github.com/" },
            { name: "GitHub CLI Terminal Tool", url: "https://cli.github.com/" },
            { name: "GitHub Mobile (iOS & Android)", url: "https://github.com/mobile" },
            { name: "GitHub Documentation & Guides", url: "https://docs.github.com" }
        ]
    ];

    const designFields = [
        "Vector Illustration", "3D Architecture Structural", "Cinematic Video Post", 
        "Game Space Environment", "Mechanical Industrial CAD", "Web System Frontend", 
        "Corporate Enterprise Branding", "Mobile UI/UX Interaction", "Data Analytical Information", 
        "VFX Simulated Special Effects", "Generative AI Systems", "Free Movie Streaming Sites", 
        "GitHub Developers Suite"
    ];
    
    const designSubTopics = ["Advanced Concepts", "Thesis Research", "Industry Boot Camp", "Portfolio Studio", "Capstone Core", "Practical Seminar", "Creative Workshop", "Experimental Design", "Technical Applied Field", "Professional Training"];
    const techSectors = ["Alpha Core Division", "Global Tech Innovation", "Strategic Operations Hub", "Creative Software Lab", "Pioneering Systems Unit", "Next-Gen Framework Block", "Synergy Network Grid", "Foundation Engineering", "Elite Technology Cluster", "Summit Corporate Sector", "Entertainment Stream Domain", "Open Source Base"];
    const neonColors = ["#ff007f", "#00ffcc", "#ff9800", "#7928ca", "#0070f3", "#38ef7d", "#fff500"];
    
    const categoryEmojis = ["🎨", "📐", "🎬", "🎮", "⚙️", "💻", "🏢", "📱", "📊", "💥", "🧠", "🍿", "🐙"];

    let cardsDataCache = [];
    let currentThemeIndex = 0;

    function aiSearchInject(keyword) {
        const searchInput = document.getElementById("appSearch");
        searchInput.focus();
        searchInput.value = keyword;
        filterSoftware(keyword);
        
        setTimeout(() => {
            const visibleNode = document.querySelector('.category:not(.hidden-node)');
            if (visibleNode) {
                visibleNode.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 120);
    }

    function populateAICopilotMenu() {
        const scrollbox = document.getElementById("aiScrollbox");
        let chipsHTML = "";
        
        designFields.forEach((field, index) => {
            const emoji = categoryEmojis[index] || "✨";
            chipsHTML += `
                <div class="ai-search-chip" onclick="aiSearchInject('${field}')">
                    <span>${field}</span> <span class="ai-chip-icon">${emoji}</span>
                </div>
            `;
        });

        chipsHTML += `
            <div class="ai-search-chip" onclick="aiSearchInject('Windows')">
                <span>Windows & OS Platforms</span> <span class="ai-chip-icon">🖥️</span>
            </div>
            <div class="ai-search-chip" onclick="aiSearchInject('Tubi TV')">
                <span>Tubi TV Special Node</span> <span class="ai-chip-icon">🎥</span>
            </div>
            <div class="ai-search-chip" onclick="aiSearchInject('GitHub Desktop')">
                <span>GitHub Desktop App</span> <span class="ai-chip-icon">🐙</span>
            </div>
        `;
        
        scrollbox.innerHTML = chipsHTML;
    }

    function triggerSpaceTheme() {
        const nebula = document.getElementById("nebula");
        const bgStatus = document.getElementById("bgStatus");
        currentThemeIndex = (currentThemeIndex + 1) % 4;
        if (currentThemeIndex === 0) {
            nebula.style.background = "radial-gradient(circle at 15% 25%, rgba(255, 0, 127, 0.12) 0%, transparent 40%), radial-gradient(circle at 85% 75%, rgba(121, 40, 202, 0.18) 0%, transparent 45%), radial-gradient(circle at 50% 50%, rgba(0, 112, 243, 0.12) 0%, transparent 40%)";
            bgStatus.innerText = "Super Cyber Space"; bgStatus.style.color = "#00FFCC";
        } else if (currentThemeIndex === 1) {
            nebula.style.background = "radial-gradient(circle at 50% 30%, rgba(0, 255, 204, 0.25) 0%, transparent 50%), radial-gradient(circle at 10% 80%, rgba(0, 112, 243, 0.2) 0%, transparent 40%)";
            bgStatus.innerText = "Deep Neon Void"; bgStatus.style.color = "#0070f3";
        } else if (currentThemeIndex === 2) {
            nebula.style.background = "radial-gradient(circle at 80% 20%, rgba(255, 0, 127, 0.25) 0%, transparent 50%), radial-gradient(circle at 20% 70%, rgba(121, 40, 202, 0.25) 0%, transparent 40%)";
            bgStatus.innerText = "Galactic Rift"; bgStatus.style.color = "#ff007f";
        } else {
            nebula.style.background = "radial-gradient(circle at 50% 50%, rgba(255, 152, 0, 0.2) 0%, transparent 60%), radial-gradient(circle at 90% 10%, rgba(255, 245, 0, 0.15) 0%, transparent 35%)";
            bgStatus.innerText = "Amber Nebula"; bgStatus.style.color = "#ff9800";
        }
        document.getElementById("card-1").scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function simulateEngineTest() {
        const status = document.getElementById("engineStatus");
        status.innerText = "⚙️ Scanning Matrix..."; status.style.color = "#fff500";
        document.getElementById("card-500").scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => {
            status.innerText = "✔️ Stable Grids"; status.style.color = "#38ef7d";
            setTimeout(() => { status.innerText = "Lag-Free Filter"; status.style.color = "#FF007F"; }, 2000);
        }, 1500);
    }

    function buildReliableEcosystem() {
        const grid = document.getElementById("softwareGrid");
        let htmlOutput = "";
        for (let i = 1; i <= 1000; i++) {
            let specificTitle = ""; let targetSectorIndex = 0;
            const colorPicked = neonColors[(i - 1) % neonColors.length];
            const idxField = (i - 1) % designFields.length;
            const idxSub = (Math.floor((i - 1) / designFields.length) + Math.floor(i / 100)) % designSubTopics.length;
            const idxSector = Math.floor((i - 1) / (designFields.length * designSubTopics.length)) % techSectors.length;

            if (designFields[idxField] === "Free Movie Streaming Sites") {
                targetSectorIndex = 11 + (i % 3); 
                specificTitle = `Cat ${i}: ${designFields[idxField]} <br><span style="font-weight:500; font-size:0.85em; color:#fff500;">🍿 [Free Movie Node]</span>`;
            } else if (designFields[idxField] === "GitHub Developers Suite") {
                targetSectorIndex = 14; 
                specificTitle = `Cat ${i}: ${designFields[idxField]} <br><span style="font-weight:500; font-size:0.85em; color:#00ffcc;">🐙 [GitHub Repository]</span>`;
            } else if (i === 2) {
                specificTitle = `Cat 2: Advanced UI/UX Web Design Studio <br><span style="font-weight:500; font-size:0.85em; color:#a0aec0;">Professional Portfolio</span>`;
                targetSectorIndex = 0;
            } else if (i === 130) {
                specificTitle = `Cat 130: VFX Simulated Special Effects <br><span style="font-weight:500; font-size:0.85em; color:#a0aec0;">[VFX Masterclass]</span>`;
                targetSectorIndex = 2;
            } else if (i % 11 === 0) {
                specificTitle = `Cat ${i}: Neural Network Framework - ${designSubTopics[idxSub]} <br><span style="font-weight:500; font-size:0.85em; color:#a0aec0;">[Generative AI Systems]</span>`;
                targetSectorIndex = 10; 
            } else {
                targetSectorIndex = idxField % 11;
                specificTitle = `Cat ${i}: ${designFields[idxField]} <br><span style="font-weight:500; font-size:0.85em; color:#a0aec0;">[${techSectors[idxSector]}]</span>`;
            }
            
            htmlOutput += `
                <div class="category" id="card-${i}" style="border: 1px solid ${colorPicked}40; border-top: 5px solid ${colorPicked};">
                    <h2 style="color: ${colorPicked}; text-shadow: 0 0 15px ${colorPicked}45;">${specificTitle}</h2>
                    <ul>
            `;
            
            const currentCategoryApps = techSectorsDatapool[targetSectorIndex];
            let searchableText = i + " " + specificTitle.replace(/<[^>]*>/g, ' ') + " ";
            
            currentCategoryApps.forEach(app => {
                searchableText += app.name + " ";
                let buttonText = "Download";
                if (designFields[idxField] === "Free Movie Streaming Sites") buttonText = "Stream";
                if (designFields[idxField] === "GitHub Developers Suite") buttonText = "Open";

                htmlOutput += `<li><span>${app.name}</span><a href="${app.url}" target="_blank" class="download-btn" style="background: linear-gradient(45deg, ${colorPicked}, rgba(255,255,255,0.1)); box-shadow: 0 4px 15px ${colorPicked}35;">${buttonText}</a></li>`;
            });
            htmlOutput += `</ul></div>`;
            cardsDataCache.push({ id: `card-${i}`, text: searchableText.toLowerCase() });
        }
        grid.innerHTML = htmlOutput;
        initScrollAnimations();
    }

    function initScrollAnimations() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('show'); } });
        }, { threshold: 0.05 });
        document.querySelectorAll('.category').forEach(card => observer.observe(card));
    }

    let searchTimeout = null;
    function handleSearch(event) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => { filterSoftware(event.target.value); }, 250);
    }

    function filterSoftware(queryValue) {
        const query = queryValue.toLowerCase().trim();
        for (let i = 0; i < cardsDataCache.length; i++) {
            const el = document.getElementById(cardsDataCache[i].id);
            if (!el) continue;
            if (cardsDataCache[i].text.includes(query)) { el.classList.remove('hidden-node'); el.classList.add('show'); }
            else { el.classList.remove('show'); el.classList.add('hidden-node'); }
        }
    }

    window.onload = function() {
        buildReliableEcosystem();
        populateAICopilotMenu();
    };
</script>

</body>
</html>
